<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI Topics Reddit Opinion Search Engine" />
    <title>AI Opinions Search</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>    
    <main class="container">
      <header class="header">
        <h1 class="reddit-title">
          <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" width="40" height="40" style="vertical-align: middle; margin-right: 18px;">
            <circle cx="10" cy="10" r="10" fill="#FF4500"/>
            <path fill="#FFF" d="M13.8 11.2c-.2 0-.4-.1-.5-.2-1-.7-2.2-1-3.3-1s-2.3.3-3.3 1c-.3.2-.6.1-.8-.1-.2-.3-.1-.6.1-.8 1.2-.8 2.6-1.2 4-1.2s2.8.4 4 1.2c.2.2.3.5.1.8-.1.2-.2.3-.3.3zM10 12.8c-2.3 0-4.3.8-5.7 2.1-.2.2-.2.6 0 .8.2.2.6.2.8 0 1.2-1.1 2.9-1.8 4.9-1.8s3.7.7 4.9 1.8c.1.1.3.2.4.2.1 0 .3-.1.4-.2.2-.2.2-.6 0-.8-1.4-1.3-3.4-2.1-5.7-2.1z"/>
            <circle cx="7" cy="8.5" r="1" fill="#FFF"/><circle cx="13" cy="8.5" r="1" fill="#FFF"/>
          </svg>
          AI Opinion Search
        </h1>
        <p class="subtitle">Explore Reddit's perspectives on artificial intelligence</p>
        
        <div id="search-section">
          <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for ChatGPT, Midjourney, AI Ethics..." autocomplete="off"/>
            <button id="search-button">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
          </div>

          <div class="filters">
            <button class="filter-btn active" data-filter="all">All Results</button>
            <button class="filter-btn" data-filter="post">Posts Only</button>
            <button class="filter-btn" data-filter="comment">Comments Only</button>
            
            <select id="time-filter" class="filter-select">
              <option value="all">All Time</option>
              <option value="day">Past 24 Hours</option>
              <option value="week">Past Week</option>
              <option value="month">Past Month</option>
            </select>
          </div>
        </div>
      </header>
      
      <!-- Back button for when we are rendering post details -->
      <div id="back-nav" class="hidden">
        <button id="back-button">← Back to Search Results</button>
      </div>

      <section id="results-container" class="results-grid">
        <!-- Results will be dynamically injected here via JS -->
      </section>
      
      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p id="loading-text">Analyzing Opinions...</p>
      </div>

    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
